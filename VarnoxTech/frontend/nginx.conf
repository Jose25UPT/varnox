
# Redirección HTTP a HTTPS
server {
    listen 80;
    server_name varnox.sytes.net;
    return 301 https://$host$request_uri;
}

# Servidor HTTPS con proxy_pass al frontend
server {
    listen 443 ssl;
    server_name varnox.sytes.net;

    ssl_certificate /etc/letsencrypt/live/varnox.sytes.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/varnox.sytes.net/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Security headers
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header X-XSS-Protection "1; mode=block";

    # Proxy al frontend (asumiendo que corre en el contenedor 'frontend' puerto 3000)
    location / {
        proxy_pass http://frontend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        proxy_pass http://frontend:3000;
    }

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/xml+rss
        application/json;
}

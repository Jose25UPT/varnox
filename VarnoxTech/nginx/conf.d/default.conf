server {
    listen 80;
    server_name varnox.sytes.net;

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name varnox.sytes.net;

    ssl_certificate /etc/letsencrypt/live/varnox.sytes.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/varnox.sytes.net/privkey.pem;

    location / {
        proxy_pass http://frontend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}

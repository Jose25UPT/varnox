version: "3.9"
services:
  # Reverse Proxy Caddy
  caddy:
    image: caddy:2-alpine
    container_name: varnox-caddy
    restart: unless-stopped
    environment:
      - ACME_AGREE=true
      - EMAIL=Luis.Jose25enero2001ing@gmail.com
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - varnox-network
  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: varnox-backend
    restart: unless-stopped
    environment:
      - ENVIRONMENT=production
      - DATABASE_URL=sqlite:///./contacts.db
      - CORS_ORIGINS=https://varnox.sytes.net,https://api.varnox.sytes.net
    expose:
      - "8000"
    volumes:
      - ./backend:/app
      - backend_uploads:/app/uploads
      - backend_data:/app/data
    networks:
      - varnox-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # Vue.js Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: varnox-frontend
    restart: unless-stopped
    environment:
      - VITE_API_URL=https://api.varnox.sytes.net
      - NODE_ENV=production
    depends_on:
      backend:
        condition: service_healthy
    expose:
      - "80"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    networks:
      - varnox-network
    stdin_open: true
    tty: true
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  caddy_data:
    driver: local
  caddy_config:
    driver: local
  backend_uploads:
    driver: local
  frontend_node_modules:
    driver: local
  backend_data:
    driver: local

networks:
  varnox-network:
    driver: bridge
